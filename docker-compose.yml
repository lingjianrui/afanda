# AFANDA interactive demo in Docker (Linux container + NVIDIA GPU).
#
# Prerequisites (Windows):
#   - Docker Desktop with WSL2 backend
#   - Latest NVIDIA driver (WSL2 CUDA support)
#   - NVIDIA Container Toolkit inside WSL2
#
# Model setup (once, on the host):
#   tar -xzf afanda_model.tar.gz
#   # yields ./avtr_model/main/...  — compose mounts avtr_model below.
#
# Optional: copy .env.example to .env and fill TURN / API keys.
#
# Start:
#   docker compose up --build
#
# Open http://localhost:7860 in your browser.
#
# If WebRTC fails to connect, configure TURN in .env (see .env.example).

services:
  afanda:
    build: .
    image: afanda-local-stream:latest
    ports:
      - "${STREAMER_PORT:-7860}:7860"
      - "${RENDERER_PORT:-8000}:8000"
    environment:
      AFANDA_LOCAL_STORAGE: /data/afanda
      STREAMER_HOST: "0.0.0.0"
      STREAMER_PORT: "7860"
      RENDERER_PORT: "8000"
      LOAD_BALANCER_URL: disabled
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      # Host path must contain `main/` (HF revision) after extracting the tarball.
      - ${AFANDA_MODEL_DIR:-./avtr_model}:/data/afanda:ro
    env_file:
      - path: .env
        required: false
    gpus: all
    shm_size: "2gb"
    restart: unless-stopped
